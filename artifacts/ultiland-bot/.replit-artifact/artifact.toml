kind = "web"
previewPath = "/"
title = "Ultiland Bot Dashboard"
version = "1.0.0"
id = "artifacts/ultiland-bot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20626

[services.development]
run = "pnpm --filter @workspace/ultiland-bot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ultiland-bot", "run", "build" ]
publicDir = "artifacts/ultiland-bot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20626"
BASE_PATH = "/"
